version: "3.8"

services:
  walnut-billing:
    build: .
    container_name: walnut-billing
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
